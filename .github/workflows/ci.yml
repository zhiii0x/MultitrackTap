name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The platform-agnostic recording core is pure Swift and builds on any recent
  # toolchain, so test it on the older macOS versions real users run.
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Versions
        run: swift --version && sw_vers
      - name: MultitrackCore — build & test
        run: |
          swift build
          swift test

  # The app uses the macOS 26 "Liquid Glass" API (`glassEffect`), guarded with
  # `if #available(macOS 26, *)` so it still RUNS on macOS 14.4+ — but the symbol
  # only exists in the macOS 26 SDK, so BUILDING needs Xcode 26. The macos-15
  # runner image ships it (macos-14's newest Xcode does not).
  app:
    name: App (macOS 26 SDK)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Versions
        run: swift --version && xcodebuild -version && sw_vers
      - name: MultitrackTap app — build & test
        working-directory: app
        run: |
          swift build
          swift test
      # Smoke-test the headless engine entry points. On a CI runner nothing is
      # producing audio, so these legitimately find nothing and exit 0 or 1
      # (e.g. `--match` throws "not found" → 1). `set +e` is required because the
      # step's default shell is `bash -e`, which would otherwise abort on that 1;
      # we only fail on a real crash (exit > 1, i.e. a signal).
      - name: Headless engine smoke test
        working-directory: app
        run: |
          set +e
          BIN="$(swift build --show-bin-path)/MultitrackTap"
          smoke() {
            "$@"
            local rc=$?
            if [ "$rc" -gt 1 ]; then
              echo "::error::'$*' exited with $rc — looks like a crash"
              exit 1
            fi
            echo "ok (exit $rc): $*"
          }
          smoke "$BIN" --list
          smoke "$BIN" --apps
          smoke "$BIN" --match com.apple.Music
