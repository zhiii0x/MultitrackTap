name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every OS even if one fails, so we see the full picture. macОS 14 uses
      # an older Xcode (material card backing); macOS 15 ships the macOS 26 SDK
      # (Liquid Glass backing). Both must build — that's the point of the matrix.
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: swift --version && xcodebuild -version && sw_vers

      # Root package: the platform-agnostic recording core (Swift 5.9).
      - name: MultitrackCore — build & test
        run: |
          swift build
          swift test

      # App package: SwiftUI app + Core Audio engine (Swift 6, depends on the
      # root package via a path dependency).
      - name: MultitrackTap app — build & test
        working-directory: app
        run: |
          swift build
          swift test

      # Smoke-test the headless engine entry points. On a CI runner nothing is
      # producing audio, so these legitimately find nothing and exit 0 or 1
      # (e.g. `--match` throws "not found" → 1). `set +e` is required because the
      # step's default shell is `bash -e`, which would otherwise abort on that 1;
      # we only fail on a real crash (exit > 1, i.e. a signal).
      - name: Headless engine smoke test
        working-directory: app
        run: |
          set +e
          BIN="$(swift build --show-bin-path)/MultitrackTap"
          smoke() {
            "$@"
            local rc=$?
            if [ "$rc" -gt 1 ]; then
              echo "::error::'$*' exited with $rc — looks like a crash"
              exit 1
            fi
            echo "ok (exit $rc): $*"
          }
          smoke "$BIN" --list
          smoke "$BIN" --apps
          smoke "$BIN" --match com.apple.Music
