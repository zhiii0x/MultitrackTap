name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every OS even if one fails, so we see the full picture.
      fail-fast: false
      matrix:
        # The app targets macOS 14.4+; the dev machine is much newer, so test on
        # the older OSes real users actually run. (macOS 13 is < 14.4, so omitted.)
        os: [macos-15, macos-14]
    steps:
      - uses: actions/checkout@v4

      # The app package is `swift-tools-version: 6.0`, which needs a Swift 6
      # (Xcode 16+) toolchain. The default Xcode on macos-14 may be older.
      - name: Select latest-stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version
          sw_vers

      # Root package: the platform-agnostic recording core (Swift 5.9).
      - name: MultitrackCore — build & test
        run: |
          swift build
          swift test

      # App package: SwiftUI app + Core Audio engine (Swift 6, depends on the
      # root package via a path dependency).
      - name: MultitrackTap app — build & test
        working-directory: app
        run: |
          swift build
          swift test

      # Smoke-test the headless engine entry points. On a CI runner nothing is
      # producing audio, so these may legitimately find nothing and exit 0 or 1
      # (e.g. --match throws "not found"); we only fail on a real crash (exit > 1,
      # i.e. a signal). This catches link errors, missing symbols and launch
      # crashes that the unit tests don't.
      - name: Headless engine smoke test
        working-directory: app
        run: |
          BIN="$(swift build --show-bin-path)/MultitrackTap"
          smoke() {
            "$@"
            local rc=$?
            if [ "$rc" -gt 1 ]; then
              echo "::error::'$*' exited with $rc — looks like a crash"
              exit 1
            fi
            echo "ok (exit $rc): $*"
          }
          smoke "$BIN" --list
          smoke "$BIN" --apps
          smoke "$BIN" --match com.apple.Music
